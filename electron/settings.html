<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexisLocal – Nastavení</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 24px;
            user-select: none;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
            padding-bottom: 18px;
            border-bottom: 1px solid #1e293b;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 700;
            color: #f8fafc;
        }
        .header p { font-size: 12px; color: #64748b; }
        .badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #0f172a;
            font-size: 10px;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }
        .section { margin-bottom: 20px; }
        .section label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 600;
        }
        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 8px;
        }
        .setting-row .info p { font-size: 13px; color: #e2e8f0; font-weight: 500; }
        .setting-row .info span { font-size: 11px; color: #64748b; }
        input[type="text"] {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px 14px;
            color: #e2e8f0;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: #f59e0b; }
        .toggle {
            width: 42px;
            height: 24px;
            background: #334155;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .toggle.active { background: #f59e0b; }
        .toggle::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: transform 0.2s;
        }
        .toggle.active::after { transform: translateX(18px); }
        .btn-save {
            width: 100%;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
        }
        .btn-save:hover { opacity: 0.9; }
        .status-bar {
            font-size: 11px;
            color: #64748b;
            text-align: center;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>LexisLocal <span class="badge">PERSONAL</span></h1>
            <p>Nastavení lokálního AI asistenta</p>
        </div>
    </div>

    <div class="section">
        <label>Sledovaná složka Spisy</label>
        <input type="text" id="watchDir" placeholder="Např. /Users/novak/Desktop/LexisSpisy">
    </div>

    <div class="section">
        <label>Port serveru</label>
        <input type="text" id="port" placeholder="4000">
    </div>

    <div class="section">
        <label>Chování systému</label>
        <div class="setting-row">
            <div class="info">
                <p>Spustit automaticky po přihlášení</p>
                <span>LexisLocal se spustí ihned po startu počítače</span>
            </div>
            <div class="toggle active" id="toggle-autostart" onclick="toggleSwitch(this, 'autostart')"></div>
        </div>
        <div class="setting-row">
            <div class="info">
                <p>Zabezpečené HTTPS připojení</p>
                <span>Vyžaduje SSL certifikát (key.pem + cert.pem)</span>
            </div>
            <div class="toggle" id="toggle-https" onclick="toggleSwitch(this, 'https')"></div>
        </div>
        <div class="setting-row">
            <div class="info">
                <p>API Token zabezpečení</p>
                <span>Vyžadovat token pro vzdálený přístup</span>
            </div>
            <div class="toggle" id="toggle-token" onclick="toggleSwitch(this, 'token')"></div>
        </div>
    </div>

    <button class="btn-save" onclick="saveSettings()">💾 Uložit nastavení a restartovat</button>
    <div class="status-bar" id="status-bar">Nastavení načtena.</div>

    <script>
        const { ipcRenderer } = require('electron');
        const os = require('os');
        const path = require('path');

        const defaults = {
            watchDir: path.join(os.homedir(), 'Desktop', 'LexisSpisy'),
            port: '4000',
            autostart: true,
            https: false,
            token: false
        };

        let settings = { ...defaults };

        // Načíst uložená nastavení z localStorage
        const saved = localStorage.getItem('lexislocal_settings');
        if (saved) {
            try { settings = { ...defaults, ...JSON.parse(saved) }; } catch(e){}
        }

        document.getElementById('watchDir').value = settings.watchDir;
        document.getElementById('port').value = settings.port;
        applyToggle('autostart', settings.autostart);
        applyToggle('https', settings.https);
        applyToggle('token', settings.token);

        function applyToggle(id, state) {
            const el = document.getElementById(`toggle-${id}`);
            if (state) el.classList.add('active');
            else el.classList.remove('active');
        }

        function toggleSwitch(el, id) {
            el.classList.toggle('active');
            settings[id] = el.classList.contains('active');
        }

        function saveSettings() {
            settings.watchDir = document.getElementById('watchDir').value.trim() || defaults.watchDir;
            settings.port = document.getElementById('port').value.trim() || defaults.port;
            localStorage.setItem('lexislocal_settings', JSON.stringify(settings));
            document.getElementById('status-bar').textContent = '✅ Nastavení uložena. Server se restartuje...';
            setTimeout(() => window.close(), 1200);
        }
    </script>
</body>
</html>
