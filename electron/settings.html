<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LexisLocal – Nastavení</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 24px;
            user-select: none;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 28px;
            padding-bottom: 18px;
            border-bottom: 1px solid #1e293b;
        }
        .header h1 {
            font-size: 18px;
            font-weight: 700;
            color: #f8fafc;
        }
        .header p { font-size: 12px; color: #64748b; }
        .badge {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #0f172a;
            font-size: 10px;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 20px;
            letter-spacing: 0.5px;
        }
        .section { margin-bottom: 20px; }
        .section label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 600;
        }
        .setting-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 8px;
        }
        .setting-row .info p { font-size: 13px; color: #e2e8f0; font-weight: 500; }
        .setting-row .info span { font-size: 11px; color: #64748b; }
        input[type="text"] {
            width: 100%;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 10px 14px;
            color: #e2e8f0;
            font-size: 13px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: #f59e0b; }
        .toggle {
            width: 42px;
            height: 24px;
            background: #334155;
            border-radius: 12px;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .toggle.active { background: #f59e0b; }
        .toggle::after {
            content: '';
            position: absolute;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            top: 3px;
            left: 3px;
            transition: transform 0.2s;
        }
        .toggle.active::after { transform: translateX(18px); }
        .btn-save {
            width: 100%;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            padding: 12px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s;
        }
        .btn-save:hover { opacity: 0.9; }
        .status-bar {
            font-size: 11px;
            color: #64748b;
            text-align: center;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>LexisLocal <span class="badge">PERSONAL</span></h1>
            <p>Nastavení lokálního AI asistenta</p>
        </div>
    </div>

    <div class="section">
        <label>Provozní režim</label>
        <select id="mode" onchange="updateModeVisibility()" style="width: 100%; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 10px 14px; color: #e2e8f0; font-size: 13px; outline: none; transition: border-color 0.2s;">
            <option value="local">Lokální (vše běží na tomto PC)</option>
            <option value="server">Síťový (připojení k Mac Mini / serveru)</option>
        </select>
    </div>

    <div class="section" id="serverUrl-section" style="display: none;">
        <label>Adresa serveru (IP / URL)</label>
        <input type="text" id="serverUrl" placeholder="Např. http://192.168.1.150:4000">
    </div>

    <div class="section" id="watchDir-section">
        <label>Sledovaná složka Spisy</label>
        <input type="text" id="watchDir" placeholder="Např. /Users/novak/Desktop/LexisSpisy">
    </div>

    <div class="section" id="port-section">
        <label>Port serveru</label>
        <input type="text" id="port" placeholder="4000">
    </div>

    <div class="section">
        <label>Chování systému</label>
        <div class="setting-row">
            <div class="info">
                <p>Spustit automaticky po přihlášení</p>
                <span>LexisLocal se spustí ihned po startu počítače</span>
            </div>
            <div class="toggle active" id="toggle-autostart" onclick="toggleSwitch(this, 'autostart')"></div>
        </div>
        <div class="setting-row" id="https-row">
            <div class="info">
                <p>Zabezpečené HTTPS připojení</p>
                <span>Vyžaduje SSL certifikát (key.pem + cert.pem)</span>
            </div>
            <div class="toggle" id="toggle-https" onclick="toggleSwitch(this, 'https')"></div>
        </div>
        <div class="setting-row" id="token-row">
            <div class="info">
                <p>API Token zabezpečení</p>
                <span>Vyžadovat token pro vzdálený přístup</span>
            </div>
            <div class="toggle" id="toggle-token" onclick="toggleSwitch(this, 'token')"></div>
        </div>
    </div>

    <button class="btn-save" onclick="saveSettings()">💾 Uložit nastavení a restartovat</button>
    <div class="status-bar" id="status-bar">Nastavení načtena.</div>

    <script>
        const defaults = {
            mode: 'local',
            serverUrl: 'http://localhost:4000',
            watchDir: 'Spisy', // Bude přepsáno skutečnou hodnotou z backendu
            port: '4000',
            autostart: true,
            https: false,
            token: false
        };

        let settings = { ...defaults };

        // Vyžádat si nastavení z hlavního procesu
        window.api.send('get-settings');

        window.api.on('settings-data', (data) => {
            settings = { ...defaults, ...data };
            
            document.getElementById('mode').value = settings.mode;
            document.getElementById('serverUrl').value = settings.serverUrl;
            document.getElementById('watchDir').value = settings.watchDir;
            document.getElementById('port').value = settings.port;
            
            applyToggle('autostart', settings.autostart);
            applyToggle('https', settings.https);
            applyToggle('token', settings.token);
            
            updateModeVisibility();
            document.getElementById('status-bar').textContent = 'Nastavení načtena z disku.';
        });

        function updateModeVisibility() {
            const mode = document.getElementById('mode').value;
            const serverUrlSec = document.getElementById('serverUrl-section');
            const watchDirSec = document.getElementById('watchDir-section');
            const portSec = document.getElementById('port-section');
            const httpsRow = document.getElementById('https-row');
            const tokenRow = document.getElementById('token-row');

            if (mode === 'server') {
                serverUrlSec.style.display = 'block';
                watchDirSec.style.display = 'none';
                portSec.style.display = 'none';
                httpsRow.style.display = 'none';
                tokenRow.style.display = 'none';
            } else {
                serverUrlSec.style.display = 'none';
                watchDirSec.style.display = 'block';
                portSec.style.display = 'block';
                httpsRow.style.display = 'flex';
                tokenRow.style.display = 'flex';
            }
        }

        function applyToggle(id, state) {
            const el = document.getElementById(`toggle-${id}`);
            if (!el) return;
            if (state) el.classList.add('active');
            else el.classList.remove('active');
        }

        function toggleSwitch(el, id) {
            el.classList.toggle('active');
            settings[id] = el.classList.contains('active');
        }

        function saveSettings() {
            settings.mode = document.getElementById('mode').value;
            settings.serverUrl = document.getElementById('serverUrl').value.trim() || defaults.serverUrl;
            settings.watchDir = document.getElementById('watchDir').value.trim() || defaults.watchDir;
            settings.port = document.getElementById('port').value.trim() || defaults.port;
            
            // Odeslat nastavení k uložení do hlavního procesu
            window.api.send('save-settings', settings);
            
            document.getElementById('status-bar').textContent = '✅ Nastavení uložena. Aplikace se restartuje...';
            setTimeout(() => window.close(), 1200);
        }
    </script>
</body>
</html>
